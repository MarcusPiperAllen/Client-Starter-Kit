kind = "web"
previewPath = "/"
title = "LaunchFrame"
version = "1.0.0"
id = "artifacts/launchframe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22911

[services.development]
run = "pnpm --filter @workspace/launchframe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/launchframe", "run", "build" ]
publicDir = "artifacts/launchframe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22911"
BASE_PATH = "/"
