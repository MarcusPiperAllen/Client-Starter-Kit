openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: intent
    description: Intent mining operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /intent/mine:
    post:
      operationId: mineIntent
      tags: [intent]
      summary: Mine a brain dump into a structured project intent
      description: >
        Takes raw, unstructured brain-dump text and returns a structured
        ExtractedIntent (constrained to the form's allowed select values), the
        detected project kind, lists of filled and missing essential fields,
        actionable suggestions, and which engine produced the result. Stateless.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MineIntentRequest"
      responses:
        "200":
          description: Mining result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinedIntentResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The AI miner is unavailable or returned an invalid response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /intent/copy:
    post:
      operationId: generateCopy
      tags: [intent]
      summary: Generate marketing copy from a structured project intent
      description: >
        Takes a structured ExtractedIntent plus the detected project kind and
        returns high-value marketing copy: hero headline and subheadline, an
        About section, per-feature descriptions, an SEO title and meta
        description, and CTA copy. The copy is constrained to the project kind
        and the selected tone/CTA. Stateless. On AI failure the client falls
        back to its built-in template copy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCopyRequest"
      responses:
        "200":
          description: Generated copy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedCopy"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: The AI copywriter is unavailable or returned an invalid response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /intent/questions:
    post:
      operationId: resolveQuestions
      tags: [intent]
      summary: Generate ranked clarifying questions from a mined intent
      description: >
        Returns up to 3 ranked questions that surface the highest-impact gaps
        in a partially-filled intent. Uses AI when available; falls back to a
        deterministic question set derived from the missing fields. Always
        returns 200 — the server handles AI failure internally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveQuestionsRequest"
      responses:
        "200":
          description: Up to 3 ranked questions. source is "ai" or "fallback".
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveQuestionsResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    MineIntentRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 8000
          description: The raw brain-dump text to mine.
      required:
        - text
    ExtractedIntent:
      type: object
      description: >
        Canonical project intent. Select fields (organizationType, tone,
        callToAction, technologyStack) are constrained to the form's allowed
        values or an empty string when unknown.
      properties:
        projectName:
          type: string
        businessName:
          type: string
        founderName:
          type: string
        organizationType:
          type: string
        primaryGoal:
          type: string
        audience:
          type: string
        services:
          type: array
          items:
            type: string
        pages:
          type: array
          items:
            type: string
        tone:
          type: string
        toneNuance:
          type: string
          description: >
            Verbatim short phrase (3–8 words) capturing the user's specific tone
            language beyond the constrained enum value. Empty string when the user
            did not specify.
        callToAction:
          type: string
        callToActionCustom:
          type: string
          description: >
            Free-text CTA phrase when the user specifies something beyond a
            standard option. Takes precedence over callToAction in copy generation
            and build prompt output. Empty string when nothing specific was given.
        technologyStack:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        notes:
          type: string
      required:
        - projectName
        - businessName
        - founderName
        - organizationType
        - primaryGoal
        - audience
        - services
        - pages
        - tone
        - toneNuance
        - callToAction
        - callToActionCustom
        - technologyStack
        - contactEmail
        - contactPhone
        - notes
    MinedIntentResult:
      type: object
      properties:
        intent:
          $ref: "#/components/schemas/ExtractedIntent"
        projectKind:
          type: string
          enum: [website, software]
        filledFields:
          type: array
          items:
            type: string
        missingFields:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        source:
          type: string
          enum: [ai, fallback]
      required:
        - intent
        - projectKind
        - filledFields
        - missingFields
        - suggestions
        - source
    GenerateCopyRequest:
      type: object
      description: >
        A structured project intent plus its detected kind, used to generate
        marketing copy. Stateless.
      properties:
        intent:
          $ref: "#/components/schemas/ExtractedIntent"
        projectKind:
          type: string
          enum: [website, software]
      required:
        - intent
        - projectKind
    GeneratedFeatureCopy:
      type: object
      description: A marketing description for a single service or feature.
      properties:
        name:
          type: string
          description: The service/feature name, matching the input verbatim.
        description:
          type: string
      required:
        - name
        - description
    GeneratedCopy:
      type: object
      description: >
        High-value marketing copy generated from a project intent. Each field
        replaces the corresponding deterministic template value in the output.
      properties:
        heroHeadline:
          type: string
        heroSubheadline:
          type: string
        about:
          type: string
        features:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedFeatureCopy"
        seoTitle:
          type: string
        metaDescription:
          type: string
        ctaCopy:
          type: string
        keywords:
          type: array
          items:
            type: string
          description: >
            4–6 buyer-intent search phrases a potential customer would type when
            actively shopping for this solution. Not feature names — real search
            queries derived from audience, offering, and niche.
        source:
          type: string
          enum: [ai, fallback]
      required:
        - heroHeadline
        - heroSubheadline
        - about
        - features
        - seoTitle
        - metaDescription
        - ctaCopy
        - keywords
        - source
    ResolutionQuestion:
      type: object
      description: A ranked clarifying question derived from gaps in a mined intent.
      properties:
        id:
          type: string
          description: Stable identifier, e.g. "q_organizationType"
        questionText:
          type: string
        rationale:
          type: string
          description: One sentence explaining why this gap matters for the build.
        answerType:
          type: string
          enum: [boolean, single-select, multi-select, short-text]
        options:
          type: array
          items:
            type: string
          description: >
            Answer choices for boolean, single-select, and multi-select types.
            Empty array for short-text questions.
        targetFields:
          type: array
          items:
            type: string
          description: Keys of ExtractedIntent to update when this question is answered.
        priority:
          type: string
          enum: [architectural, content]
      required:
        - id
        - questionText
        - rationale
        - answerType
        - options
        - targetFields
        - priority
    ResolveQuestionsRequest:
      type: object
      properties:
        intent:
          $ref: "#/components/schemas/ExtractedIntent"
        projectKind:
          type: string
          enum: [software, website]
        suggestions:
          type: array
          items:
            type: string
        missingFields:
          type: array
          items:
            type: string
      required:
        - intent
        - projectKind
        - suggestions
        - missingFields
    ResolveQuestionsResult:
      type: object
      description: Up to 3 ranked clarifying questions and their source.
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ResolutionQuestion"
        source:
          type: string
          enum: [ai, fallback]
      required:
        - questions
        - source

